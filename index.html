<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajatrades | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --geist-foreground: #fff;
            --geist-background: #000;
            --accents-1: #111;
            --accents-2: #333;
            --accents-8: #888;
            --geist-success: #0070f3;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--geist-background);
            color: var(--geist-foreground);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px;
        }

        /* Vercel Style Header */
        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .brand {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin: 0;
            color: #fff;
        }

        .tagline {
            color: var(--accents-8);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        /* Social Tabs - Minimalist */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 50px;
        }

        .tab-item {
            border: 1px solid var(--accents-2);
            background: var(--geist-background);
            color: var(--geist-foreground);
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .tab-item:hover {
            background: var(--geist-foreground);
            color: var(--geist-background);
        }

        /* Referral Table - Vercel Dashboard Look */
        .container {
            width: 100%;
            max-width: 650px;
            border: 1px solid var(--accents-2);
            border-radius: 8px;
            background: var(--accents-1);
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--accents-2);
        }

        .row:last-child { border-bottom: none; }

        .name-stack {
            display: flex;
            flex-direction: column;
        }

        .platform {
            font-weight: 600;
            font-size: 1rem;
        }

        .url {
            font-size: 0.8rem;
            color: var(--accents-8);
        }

        .code-box {
            font-family: monospace;
            background: #000;
            border: 1px solid var(--accents-2);
            padding: 4px 10px;
            border-radius: 4px;
            color: var(--geist-success);
            font-weight: bold;
        }

        .action-link {
            text-decoration: none;
            color: var(--geist-foreground);
            font-size: 0.9rem;
            font-weight: 500;
            padding: 6px 12px;
            border: 1px solid var(--accents-2);
            border-radius: 5px;
            transition: 0.2s;
        }

        .action-link:hover {
            border-color: var(--geist-foreground);
        }

        @media (max-width: 600px) {
            .tabs { flex-direction: column; width: 100%; max-width: 300px; }
            .brand { font-size: 2.5rem; }
            .row { flex-direction: column; gap: 15px; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="brand">Rajatrades</h1>
        <p class="tagline">Trading infrastructure & referral network.</p>
    </div>

    <div class="tabs">
        <a href="https://x.com/mrraja1326?s=21" class="tab-item" target="_blank"><i class="fab fa-x-twitter"></i> Twitter</a>
        <a href="https://www.instagram.com/rajatrades.in" class="tab-item" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://youtube.com/@rajatrades" class="tab-item" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>
    </div>

    <div class="container">
        <!-- Row 1 -->
        <div class="row">
            <div class="name-stack">
                <span class="platform">Lucid Trading</span>
                <span class="url">lucidtrading.com</span>
            </div>
            <div class="code-box">RAJA</div>
            <a href="https://lucidtrading.com/ref/rajatrades" class="action-link" target="_blank">Visit Site</a>
        </div>
        <!-- Row 2 -->
        <div class="row">
            <div class="name-stack">
                <span class="platform">Tradeify</span>
                <span class="url">tradeify.co</span>
            </div>
            <div class="code-box">RAJA</div>
            <a href="https://tradeify.co/?ref=RAJA" class="action-link" target="_blank">Visit Site</a>
        </div>
    </div>

</body>
</html>
